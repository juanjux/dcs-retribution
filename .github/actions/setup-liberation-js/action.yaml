name: Retribution JS set-up
description: Sets up the Retribution Javascript environment.
runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "24"
        cache: npm
        cache-dependency-path: client/package-lock.json

    - name: npm ci
      shell: powershell
      run: |
        cd client
        npm ci
