description:
  "The Eurofighter Typhoon is a twin-engine, delta-canard multirole fighter built by a
  European consortium (Airbus, BAE Systems, Leonardo) and flown by the RAF, Luftwaffe,
  Aeronautica Militare, Ejercito del Aire and others. Highly agile and equipped with
  the CAPTOR radar and a modern defensive-aids suite, it excels at air superiority with
  AIM-120, IRIS-T and ASRAAM, and is fully multirole: precision strike (Paveway, JDAM),
  defence suppression (ALARM/HARM), anti-ship (RBS-15) and close air support."
