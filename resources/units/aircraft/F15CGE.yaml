description:
  "The F-15C Golden Eagle is a mid-life-refresh upgrade of the classic F-15C air-
  superiority fighter, bringing the AN/APG-63(V)3 AESA radar, modern datalink and
  countermeasures to the Eagle while keeping its pure air-dominance focus. It carries
  the latest beyond-visual-range missiles (AIM-120C/D, AIM-260 JATM) alongside the
  AIM-9X, making it a dedicated, long-reach counter-air platform rather than a
  multirole strike aircraft."
