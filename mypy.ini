[mypy]
# TODO: Cleanup so we can enable the checks commented out here.
check_untyped_defs = True
# disallow_any_decorated = True
# disallow_any_expr = True
disallow_any_generics = True
# disallow_any_unimported = True
disallow_untyped_decorators = True
disallow_untyped_defs = True
follow_imports = silent
# implicit_reexport = False
namespace_packages = True
no_implicit_optional = True
warn_redundant_casts = True
# warn_return_any = True
warn_unreachable = True
warn_unused_ignores = True
plugins = pydantic.mypy

[mypy-faker.*]
ignore_missing_imports = True

[mypy-shapely.*]
# https://github.com/Toblerity/Shapely/issues/721
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True

[mypy-mgrs.*]
# mgrs ships no type stubs / py.typed marker.
ignore_missing_imports = True

# These unit tests drive the code with lightweight fakes (SimpleNamespace, _Fake*
# stand-ins) instead of constructing full engine objects, so mypy flags the mock
# arguments/assignments. The mocks are deliberate; relax those checks for the files.
[mypy-tests.theater.test_ship_movement]
disable_error_code = assignment, arg-type, list-item

[mypy-tests.theater.test_repair_reporting]
disable_error_code = arg-type, type-arg

[mypy-tests.ato.test_escort_hold]
disable_error_code = assignment, arg-type